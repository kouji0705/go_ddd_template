version: "3.8"

services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=dbname
    depends_on:
      db:
        condition: service_healthy
    # アプリのログを logdy にパイプする
    command: >
      sh -c "air -c .air.toml 2>&1 | logdy stdin"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=dbname
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dbname"]
      interval: 5s
      timeout: 5s
      retries: 5

  logdy:
    image: logdy/logdy:latest
    ports:
      - "8081:8080"
    # app コンテナのログを Docker ログドライバー経由で受信する
    command: ["forward", "8080"]

volumes:
  db_data:
